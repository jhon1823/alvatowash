<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pago cancelado · Alvatowash</title>
<link rel="icon" href="../../icon.svg">
<style>
:root{
  --bg:#0a0a0a; --bg-2:#141414; --card:#181818; --ink:#fafafa; --ink-2:#a8a8a8; --ink-3:#6b6b6b;
  --line:rgba(255,255,255,.08);
  --accent:#ef4444;
  --serif:'Instrument Serif',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap');
body{
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;padding:24px;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.card{
  max-width:440px;width:100%;background:var(--card);
  border:1px solid var(--line);border-radius:32px;padding:48px 28px;
  animation:fadeIn .6s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.icon{
  width:80px;height:80px;border-radius:50%;
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
}
.icon svg{width:36px;height:36px;color:var(--accent)}
.kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px}
h1{
  font-family:var(--serif);font-style:italic;font-weight:400;
  font-size:38px;line-height:1.05;margin-bottom:14px;
}
p{color:var(--ink-2);font-size:15px;line-height:1.55;margin-bottom:28px}
.cta-stack{display:flex;flex-direction:column;gap:10px}
.btn{
  padding:14px 24px;border-radius:999px;font-weight:600;font-size:15px;
  border:none;cursor:pointer;text-decoration:none;display:inline-flex;
  align-items:center;justify-content:center;gap:8px;transition:transform .2s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--ink);color:var(--bg)}
.btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--line)}
</style>
</head>
<body>
<main class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </div>
  <div class="kicker">Pago no completado</div>
  <h1>No te preocupes.</h1>
  <p>Tu reserva sigue ahí. Puedes intentarlo de nuevo o pagar directamente en el centro cuando vengas.</p>

  <div class="cta-stack">
    <a href="../" class="btn btn-primary">Intentar de nuevo</a>
    <a href="../../" class="btn btn-ghost">Volver al inicio</a>
  </div>
</main>
</body>
</html>
