<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pago confirmado · Alvatowash</title>
<link rel="icon" href="../../icon.svg">
<script src="../../config.js"></script>
<style>
:root{
  --bg:#0a0a0a; --bg-2:#141414; --card:#181818; --ink:#fafafa; --ink-2:#a8a8a8; --ink-3:#6b6b6b;
  --line:rgba(255,255,255,.08);
  --gold:#d4af37; --gold-2:#f4d76e;
  --good:#22c55e; --good-2:#16a34a;
  --serif:'Instrument Serif',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap');
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;text-align:center;
  background-image:radial-gradient(1200px 600px at 50% 0%,rgba(34,197,94,.08) 0%,transparent 60%);
}
.success-card{
  max-width:480px;width:100%;
  background:linear-gradient(180deg,rgba(34,197,94,.05) 0%,var(--card) 80%);
  border:1px solid var(--line);border-radius:32px;padding:48px 28px;
  animation:zoomIn .8s cubic-bezier(.32,.72,0,1);
}
@keyframes zoomIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.success-icon{
  width:96px;height:96px;border-radius:50%;
  background:linear-gradient(135deg,var(--good),var(--good-2));
  display:flex;align-items:center;justify-content:center;margin:0 auto 24px;
  box-shadow:0 16px 48px rgba(34,197,94,.4);animation:popIn .6s .2s both cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-icon svg{width:48px;height:48px;color:#fff}
.kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--good);font-weight:600;margin-bottom:12px}
h1{
  font-family:var(--serif);font-style:italic;font-weight:400;
  font-size:42px;line-height:1.05;margin-bottom:12px;color:var(--ink);
}
.subtitle{font-size:16px;color:var(--ink-2);margin-bottom:32px;line-height:1.5}
.detail-box{
  background:var(--bg-2);border:1px solid var(--line);border-radius:18px;
  padding:18px 20px;margin-bottom:28px;text-align:left;
}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px}
.detail-row + .detail-row{border-top:1px solid var(--line)}
.detail-label{color:var(--ink-3);font-size:12.5px}
.detail-value{color:var(--ink);font-weight:600}
.detail-value.amount{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--good-2)}
.cta-stack{display:flex;flex-direction:column;gap:10px}
.btn{
  padding:14px 24px;border-radius:999px;font-weight:600;font-size:15px;
  border:none;cursor:pointer;text-decoration:none;display:inline-flex;
  align-items:center;justify-content:center;gap:8px;
  transition:transform .2s ease,opacity .2s ease;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--ink);color:var(--bg);}
.btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--line)}
.status-msg{
  font-size:13px;color:var(--ink-3);margin-top:18px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.spinner{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--good);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<main class="success-card">
  <div class="success-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <div class="kicker">Pago confirmado</div>
  <h1>Reserva confirmada.</h1>
  <p class="subtitle" id="subtitle">Gracias por tu pago. Te esperamos en el centro.</p>

  <div class="detail-box" id="detail">
    <div class="detail-row">
      <span class="detail-label">ID Reserva</span>
      <span class="detail-value" id="dId">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Estado del pago</span>
      <span class="detail-value" id="dStatus">Verificando…</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Importe</span>
      <span class="detail-value amount" id="dAmount">—</span>
    </div>
  </div>

  <div class="cta-stack">
    <a href="../../area-cliente/" class="btn btn-primary">
      Acceder a mi área VIP
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    <a href="../../" class="btn btn-ghost">Volver al inicio</a>
  </div>

  <div class="status-msg" id="statusMsg">
    <span class="spinner"></span>
    Confirmando el pago con la pasarela…
  </div>
</main>

<script>
const CFG = window.ALVATOWASH_CONFIG || {};
const qs = new URLSearchParams(window.location.search);
const bookingId = qs.get('id') || '';
const sessionId = qs.get('session_id') || '';

document.getElementById('dId').textContent = bookingId || '—';

function bgCall(action, params={}){
  return new Promise((resolve, reject) => {
    if (!CFG.script_url) { reject(new Error('Sin backend')); return; }
    const cbName = '_xcb_' + Date.now() + '_' + Math.floor(Math.random()*1000);
    window[cbName] = (d) => { delete window[cbName]; s.remove(); resolve(d); };
    const qs2 = new URLSearchParams({ action, token: CFG.script_token || '', callback: cbName, ...params });
    const s = document.createElement('script');
    s.src = CFG.script_url + '?' + qs2.toString();
    s.onerror = () => { delete window[cbName]; s.remove(); reject(new Error('Network')); };
    document.head.appendChild(s);
    setTimeout(() => { if (window[cbName]) { delete window[cbName]; s.remove(); reject(new Error('Timeout')); } }, 18000);
  });
}

async function verify(){
  const msg = document.getElementById('statusMsg');
  const dStatus = document.getElementById('dStatus');
  const dAmount = document.getElementById('dAmount');
  if (!bookingId || !sessionId) {
    msg.innerHTML = 'Falta información de la sesión. Tu reserva está guardada.';
    dStatus.textContent = 'Pendiente de verificar';
    return;
  }
  try {
    const r = await bgCall('confirmStripePayment', { bookingId, sessionId });
    if (r && r.ok && r.paymentStatus === 'paid') {
      dStatus.textContent = 'Pagado';
      dStatus.style.color = 'var(--good-2)';
      dAmount.textContent = (r.amount || 0).toFixed(2) + ' €';
      msg.innerHTML = '<span style="color:var(--good-2)">✓ Pago confirmado</span>';
      document.getElementById('subtitle').textContent = '¡Listo! Tu reserva está confirmada y pagada. Recibirás un email de Stripe con el recibo.';
    } else {
      dStatus.textContent = (r && r.paymentStatus) || 'Pendiente';
      msg.innerHTML = 'El pago aún se está procesando. Te avisaremos por email.';
    }
  } catch(e) {
    msg.innerHTML = 'No pudimos verificar ahora. Tu reserva está guardada y la verificaremos en breve.';
    dStatus.textContent = 'Verificando…';
  }
}
verify();
</script>
</body>
</html>
